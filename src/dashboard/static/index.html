<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nardo dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1117;
    --card:     #161b22;
    --text:     #e6edf3;
    --cyan:     #79c0ff;
    --green:    #56d364;
    --yellow:   #e3b341;
    --dim:      #8b949e;
    --border:   #30363d;
    --red:      #f85149;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; line-height: 1.5; }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100%; }

  header {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    flex-shrink: 0;
  }
  header .logo { font-size: 18px; font-weight: 700; color: var(--cyan); letter-spacing: -0.5px; }
  header .palace-path { color: var(--dim); font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  header .pill {
    background: var(--border); color: var(--cyan);
    padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
    white-space: nowrap;
  }

  .body { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  #sidebar {
    width: 200px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  #sidebar h3 { font-size: 10px; text-transform: uppercase; color: var(--dim); letter-spacing: 1px; padding: 0 14px 6px; }
  .wing-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 14px; cursor: pointer; border-radius: 4px; margin: 0 4px;
    color: var(--text);
  }
  .wing-item:hover { background: var(--border); }
  .wing-item.active { background: rgba(121,192,255,0.12); color: var(--cyan); }
  .wing-item .badge {
    background: var(--border); color: var(--dim);
    font-size: 10px; padding: 1px 6px; border-radius: 8px;
  }
  .wing-item.active .badge { background: rgba(121,192,255,0.2); color: var(--cyan); }
  .wing-all { font-style: italic; color: var(--dim); }

  /* Main content */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Tabs */
  .tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--card); flex-shrink: 0;
  }
  .tab {
    padding: 10px 20px; cursor: pointer; color: var(--dim);
    border-bottom: 2px solid transparent; font-size: 12px;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  /* Tab content */
  .tab-content { flex: 1; overflow-y: auto; padding: 20px; display: none; }
  .tab-content.active { display: block; }

  /* Stat cards */
  .stat-cards { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px; flex: 1; min-width: 140px;
  }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--cyan); }
  .stat-card .label { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .stat-card .sub { font-size: 11px; color: var(--dim); margin-top: 4px; }

  /* Section */
  .section { margin-bottom: 28px; }
  .section-title { font-size: 11px; text-transform: uppercase; color: var(--dim); letter-spacing: 1px; margin-bottom: 12px; }

  /* Bar chart */
  #wing-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { width: 120px; color: var(--text); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
  .bar-track { flex: 1; background: var(--border); border-radius: 3px; height: 14px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--cyan); border-radius: 3px; transition: width 0.4s ease; }
  .bar-count { width: 50px; color: var(--dim); font-size: 11px; text-align: right; }

  /* Recent drawers */
  .drawer-list { display: flex; flex-direction: column; gap: 8px; }
  .drawer-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 14px;
  }
  .drawer-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; flex-wrap: wrap; }
  .drawer-wing { color: var(--cyan); font-size: 11px; }
  .drawer-room { color: var(--text); font-size: 11px; }
  .drawer-slash { color: var(--border); }
  .drawer-date { color: var(--dim); font-size: 10px; margin-left: auto; }
  .drawer-text { color: var(--dim); font-size: 12px; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  /* Search */
  .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-input {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; color: var(--text);
    font-family: inherit; font-size: 13px; outline: none;
  }
  .search-input:focus { border-color: var(--cyan); }
  .search-input::placeholder { color: var(--dim); }
  .search-filters { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .filter-select {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; color: var(--text);
    font-family: inherit; font-size: 12px; outline: none;
  }
  .filter-select:focus { border-color: var(--cyan); }
  .filter-label { color: var(--dim); font-size: 11px; }

  .search-result {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px; margin-bottom: 8px;
  }
  .result-header { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .result-wing { color: var(--cyan); font-size: 12px; font-weight: 600; }
  .result-room { color: var(--text); font-size: 12px; }
  .result-score-high { color: var(--green); font-size: 11px; }
  .result-score-mid  { color: var(--yellow); font-size: 11px; }
  .result-score-low  { color: var(--dim); font-size: 11px; }
  .result-source { color: var(--dim); font-size: 10px; margin-left: auto; }
  .result-text { color: var(--dim); font-size: 12px; line-height: 1.5; white-space: pre-wrap; max-height: 120px; overflow: hidden; }
  .result-boost { color: var(--yellow); font-size: 10px; }

  .search-empty { color: var(--dim); font-size: 13px; padding: 24px 0; text-align: center; }

  /* Graph table view */
  #kg-panels { display: flex; gap: 12px; height: 560px; }
  #kg-entity-panel { width: 260px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  #kg-entity-search { width: 100%; box-sizing: border-box; background: var(--bg); border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 12px; padding: 8px 10px; outline: none; }
  #kg-entity-search::placeholder { color: var(--dim); }
  #kg-entity-list { flex: 1; overflow-y: auto; }
  .kg-entity-row { padding: 7px 10px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .kg-entity-row:hover { background: var(--border); }
  .kg-entity-row.active { background: rgba(121,192,255,0.12); color: var(--cyan); }
  .kg-entity-type { font-size: 9px; color: var(--dim); background: var(--border); border-radius: 3px; padding: 1px 4px; flex-shrink: 0; }
  .kg-entity-label { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #kg-rel-panel { flex: 1; display: flex; flex-direction: column; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  #kg-rel-header { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--cyan); flex-shrink: 0; }
  #kg-rel-body { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .kg-rel-section { margin-bottom: 16px; }
  .kg-rel-section-title { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .kg-rel-table { width: 100%; border-collapse: collapse; }
  .kg-rel-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .kg-rel-table td:first-child { color: var(--dim); width: 40%; }
  .kg-rel-table td.kg-target { color: var(--cyan); cursor: pointer; }
  .kg-rel-table td.kg-target:hover { text-decoration: underline; }
  .kg-conf { font-size: 10px; color: var(--dim); }
  #kg-empty { color: var(--dim); font-size: 12px; padding: 20px 0; }

  .sort-toggle { display: flex; gap: 4px; margin-left: auto; }
  .sort-btn { background: var(--border); border: none; color: var(--dim); font-family: inherit; font-size: 10px; padding: 3px 8px; border-radius: 3px; cursor: pointer; }
  .sort-btn.active { background: rgba(121,192,255,0.15); color: var(--cyan); }
  .section-header { display: flex; align-items: center; margin-bottom: 10px; }
  .section-header .section-title { margin-bottom: 0; }

  /* Timeline */
  .timeline-group { margin-bottom: 20px; }
  .timeline-date { font-size: 11px; color: var(--cyan); margin-bottom: 8px; letter-spacing: 0.5px; }
  .timeline-items { display: flex; flex-direction: column; gap: 6px; }

  /* Loading */
  .loading { color: var(--dim); font-size: 12px; padding: 20px 0; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--dim); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">nardo</div>
    <div class="palace-path" id="palace-path">loading…</div>
    <div class="pill" id="drawer-pill">— drawers</div>
  </header>
  <div class="body">
    <nav id="sidebar">
      <h3>Wings</h3>
      <div id="wing-list"><div class="loading">loading…</div></div>
    </nav>
    <div id="main">
      <div class="tabs">
        <div class="tab active" data-tab="overview">Overview</div>
        <div class="tab" data-tab="search">Search</div>
        <div class="tab" data-tab="graph">Graph</div>
        <div class="tab" data-tab="timeline">Timeline</div>
      </div>
      <div id="tab-overview" class="tab-content active">
        <div class="stat-cards" id="stat-cards">
          <div class="stat-card"><div class="value">—</div><div class="label">drawers</div></div>
          <div class="stat-card"><div class="value">—</div><div class="label">wings</div></div>
          <div class="stat-card"><div class="value">—</div><div class="label">rooms</div></div>
          <div class="stat-card"><div class="value">—</div><div class="label">palace size</div><div class="sub" id="palace-path-sub"></div></div>
        </div>
        <div class="section">
          <div class="section-title">Drawers per wing</div>
          <div id="wing-chart"></div>
        </div>
        <div class="section">
          <div class="section-header"><div class="section-title">Recent drawers</div><div class="sort-toggle" id="overview-sort"><button class="sort-btn active" data-sort="desc">newest</button><button class="sort-btn" data-sort="asc">oldest</button></div></div>
          <div id="recent-list" class="drawer-list"><div class="loading">loading…</div></div>
        </div>
      </div>
      <div id="tab-search" class="tab-content">
        <div class="search-bar">
          <input id="search-input" class="search-input" placeholder="Search drawers…" autocomplete="off" spellcheck="false">
        </div>
        <div class="search-filters">
          <span class="filter-label">wing</span>
          <select id="search-wing" class="filter-select"><option value="">all</option></select>
          <span class="filter-label">room</span>
          <select id="search-room" class="filter-select"><option value="">all</option></select>
          <span class="filter-label">limit</span>
          <select id="search-limit" class="filter-select">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
          </select>
        </div>
        <div id="search-results"></div>
      </div>
      <div id="tab-graph" class="tab-content">
        <div class="section-title">Knowledge graph</div>
        <div id="kg-panels">
          <div id="kg-entity-panel">
            <input id="kg-entity-search" type="text" placeholder="filter entities…">
            <div id="kg-entity-list"><div class="loading">loading…</div></div>
          </div>
          <div id="kg-rel-panel">
            <div id="kg-rel-header">select an entity to see relationships</div>
            <div id="kg-rel-body"><div id="kg-empty">←  pick an entity from the list</div></div>
          </div>
        </div>
      </div>
      <div id="tab-timeline" class="tab-content">
        <div class="section-header"><div class="section-title">Timeline</div><div class="sort-toggle" id="timeline-sort"><button class="sort-btn active" data-sort="desc">newest</button><button class="sort-btn" data-sort="asc">oldest</button></div></div>
        <div id="timeline-content"><div class="loading">loading…</div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── state ──────────────────────────────────────────────────────────────────
let activeWing = null
let sortOrder = 'desc'
let allWings = []
let allRooms = []
let searchTimer = null
let graphLoaded = false
let timelineLoaded = false

// ── helpers ────────────────────────────────────────────────────────────────
async function api(path) {
  try {
    const r = await fetch(path)
    return r.json()
  } catch {
    return {}
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function formatDate(iso) {
  if (!iso) return ''
  const d = new Date(iso)
  return d.toISOString().slice(0, 10)
}

function formatDatetime(iso) {
  if (!iso) return ''
  const d = new Date(iso)
  return d.toISOString().slice(0, 16).replace('T', ' ')
}

function scoreClass(sim) {
  if (sim >= 0.7) return 'result-score-high'
  if (sim >= 0.55) return 'result-score-mid'
  return 'result-score-low'
}

// ── load stats ─────────────────────────────────────────────────────────────
async function loadStats() {
  const data = await api('/api/stats')
  document.getElementById('palace-path').textContent = data.palace_path ?? '—'
  document.getElementById('palace-path-sub').textContent = data.palace_path ?? ''
  document.getElementById('drawer-pill').textContent = (data.total_drawers ?? '—') + ' drawers'

  const cards = document.getElementById('stat-cards')
  cards.innerHTML = `
    <div class="stat-card"><div class="value">${(data.total_drawers ?? 0).toLocaleString()}</div><div class="label">drawers</div></div>
    <div class="stat-card"><div class="value">${(data.wings_count ?? 0).toLocaleString()}</div><div class="label">wings</div></div>
    <div class="stat-card"><div class="value">${(data.rooms_count ?? 0).toLocaleString()}</div><div class="label">rooms</div></div>
    <div class="stat-card"><div class="value" style="font-size:18px">${esc(data.palace_size ?? '—')}</div><div class="label">palace size</div></div>
  `
}

// ── load wings ─────────────────────────────────────────────────────────────
async function loadWings() {
  const data = await api('/api/wings')
  allWings = data.wings ?? []
  renderSidebar()
  renderWingChart()
  populateSearchWings()
}

function renderSidebar() {
  const el = document.getElementById('wing-list')
  const items = [
    `<div class="wing-item ${activeWing === null ? 'active' : ''} wing-all" data-wing="">all wings<span class="badge">${allWings.reduce((a,w) => a + w.count, 0)}</span></div>`,
    ...allWings.map(w =>
      `<div class="wing-item ${activeWing === w.name ? 'active' : ''}" data-wing="${esc(w.name)}">${esc(w.name)}<span class="badge">${w.count}</span></div>`
    )
  ]
  el.innerHTML = items.join('')
  el.querySelectorAll('.wing-item').forEach(item => {
    item.addEventListener('click', () => {
      const wing = item.dataset.wing || null
      setActiveWing(wing)
    })
  })
}

function setActiveWing(wing) {
  activeWing = wing || null
  renderSidebar()
  // Reload current tab with wing filter
  const activeTab = document.querySelector('.tab.active')?.dataset.tab
  if (activeTab === 'overview') {
    loadRecentDrawers()
    renderWingChart()
  } else if (activeTab === 'timeline') {
    loadTimeline()
  } else if (activeTab === 'search') {
    document.getElementById('search-wing').value = activeWing || ''
    runSearch()
  }
}

function renderWingChart() {
  const el = document.getElementById('wing-chart')
  if (!allWings.length) { el.innerHTML = '<span style="color:var(--dim)">no data</span>'; return }
  const max = Math.max(...allWings.map(w => w.count), 1)
  el.innerHTML = allWings.map(w => `
    <div class="bar-row">
      <div class="bar-label">${esc(w.name)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(w.count/max*100)}%"></div></div>
      <div class="bar-count">${w.count.toLocaleString()}</div>
    </div>
  `).join('')
}

// ── recent drawers ─────────────────────────────────────────────────────────
async function loadRecentDrawers() {
  const el = document.getElementById('recent-list')
  el.innerHTML = '<div class="loading">loading…</div>'
  let url = '/api/drawers/recent?limit=20&sort=' + sortOrder
  if (activeWing) url += '&wing=' + encodeURIComponent(activeWing)
  const data = await api(url)
  const drawers = data.drawers ?? []
  if (!drawers.length) { el.innerHTML = '<div class="search-empty">no drawers found</div>'; return }
  el.innerHTML = drawers.map(d => drawerCard(d)).join('')
}

function drawerCard(d) {
  const source = d.source_file ? d.source_file.split('/').pop() : ''
  return `
    <div class="drawer-item">
      <div class="drawer-meta">
        <span class="drawer-wing">${esc(d.wing)}</span>
        <span class="drawer-slash">/</span>
        <span class="drawer-room">${esc(d.room)}</span>
        ${source ? `<span class="drawer-date">${esc(source)}</span>` : ''}
        <span class="drawer-date">${esc(formatDatetime(d.filed_at))}</span>
      </div>
      <div class="drawer-text">${esc(d.text)}</div>
    </div>
  `
}

// ── search ─────────────────────────────────────────────────────────────────
function populateSearchWings() {
  const sel = document.getElementById('search-wing')
  const cur = sel.value
  sel.innerHTML = '<option value="">all</option>' + allWings.map(w =>
    `<option value="${esc(w.name)}" ${cur === w.name ? 'selected' : ''}>${esc(w.name)}</option>`
  ).join('')
}

async function loadRoomsForSearch() {
  const wing = document.getElementById('search-wing').value
  const data = await api(`/api/rooms${wing ? '?wing=' + encodeURIComponent(wing) : ''}`)
  allRooms = data.rooms ?? []
  const sel = document.getElementById('search-room')
  sel.innerHTML = '<option value="">all</option>' + allRooms.map(r =>
    `<option value="${esc(r.room)}">${esc(r.room)} (${r.count})</option>`
  ).join('')
}

async function runSearch() {
  const q = document.getElementById('search-input').value.trim()
  const wing = document.getElementById('search-wing').value
  const room = document.getElementById('search-room').value
  const limit = document.getElementById('search-limit').value
  const el = document.getElementById('search-results')

  if (!q) { el.innerHTML = '<div class="search-empty">type to search</div>'; return }
  el.innerHTML = '<div class="loading">searching…</div>'

  let url = `/api/search?q=${encodeURIComponent(q)}&limit=${limit}`
  if (wing) url += `&wing=${encodeURIComponent(wing)}`
  if (room) url += `&room=${encodeURIComponent(room)}`

  const data = await api(url)
  const results = data.results ?? []
  if (!results.length) { el.innerHTML = '<div class="search-empty">no results</div>'; return }

  el.innerHTML = results.map((r, i) => {
    const source = r.source_file ? r.source_file.split('/').pop() : ''
    const sc = scoreClass(r.similarity)
    return `
      <div class="search-result">
        <div class="result-header">
          <span class="result-wing">${esc(r.wing)}</span>
          <span style="color:var(--dim)">/</span>
          <span class="result-room">${esc(r.room)}</span>
          <span class="${sc}">${r.similarity.toFixed(3)}</span>
          ${r.matched_via === 'drawer+closet' ? '<span class="result-boost">+closet</span>' : ''}
          ${source ? `<span class="result-source">${esc(source)}</span>` : ''}
        </div>
        <div class="result-text">${esc(r.text)}</div>
      </div>
    `
  }).join('')
}

document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchTimer)
  searchTimer = setTimeout(runSearch, 300)
})
document.getElementById('search-wing').addEventListener('change', () => {
  loadRoomsForSearch()
  runSearch()
})
document.getElementById('search-room').addEventListener('change', runSearch)
document.getElementById('search-limit').addEventListener('change', runSearch)

// ── graph ──────────────────────────────────────────────────────────────────
let kgNodes = [], kgEdges = [], kgSelected = null

async function loadGraph() {
  if (graphLoaded) return
  graphLoaded = true

  const data = await api('/api/kg/graph')
  kgNodes = data.nodes ?? []
  kgEdges = data.edges ?? []

  renderEntityList(kgNodes)

  document.getElementById('kg-entity-search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase()
    renderEntityList(q ? kgNodes.filter(n => n.label.toLowerCase().includes(q) || n.id.toLowerCase().includes(q)) : kgNodes)
  })
}

function renderEntityList(nodes) {
  const list = document.getElementById('kg-entity-list')
  if (!nodes.length) {
    list.innerHTML = '<div style="padding:12px;color:var(--dim);font-size:12px;">no entities</div>'
    return
  }
  list.innerHTML = nodes.map(n => `
    <div class="kg-entity-row${kgSelected === n.id ? ' active' : ''}" data-id="${esc(n.id)}">
      <span class="kg-entity-type">${esc(n.type)}</span>
      <span class="kg-entity-label" title="${esc(n.label)}">${esc(n.label)}</span>
    </div>
  `).join('')
  list.querySelectorAll('.kg-entity-row').forEach(row => {
    row.addEventListener('click', () => selectEntity(row.dataset.id))
  })
}

function selectEntity(id) {
  kgSelected = id
  const node = kgNodes.find(n => n.id === id)
  if (!node) return

  document.querySelectorAll('.kg-entity-row').forEach(r => r.classList.toggle('active', r.dataset.id === id))

  const outgoing = kgEdges.filter(e => e.source === id)
  const incoming = kgEdges.filter(e => e.target === id)

  const header = document.getElementById('kg-rel-header')
  header.textContent = node.label + (node.type !== 'unknown' ? '  ·  ' + node.type : '')

  let html = ''

  if (outgoing.length) {
    html += `<div class="kg-rel-section">
      <div class="kg-rel-section-title">outgoing (${outgoing.length})</div>
      <table class="kg-rel-table"><tbody>
        ${outgoing.map(e => {
          const target = kgNodes.find(n => n.id === e.target)
          const conf = e.confidence < 1 ? ` <span class="kg-conf">${(e.confidence * 100).toFixed(0)}%</span>` : ''
          const stale = !e.current ? ' <span class="kg-conf">(stale)</span>' : ''
          return `<tr><td>${esc(e.label)}${conf}${stale}</td><td class="kg-target" data-id="${esc(e.target)}">${esc(target?.label ?? e.target)}</td></tr>`
        }).join('')}
      </tbody></table>
    </div>`
  }

  if (incoming.length) {
    html += `<div class="kg-rel-section">
      <div class="kg-rel-section-title">incoming (${incoming.length})</div>
      <table class="kg-rel-table"><tbody>
        ${incoming.map(e => {
          const source = kgNodes.find(n => n.id === e.source)
          const conf = e.confidence < 1 ? ` <span class="kg-conf">${(e.confidence * 100).toFixed(0)}%</span>` : ''
          const stale = !e.current ? ' <span class="kg-conf">(stale)</span>' : ''
          return `<tr><td class="kg-target" data-id="${esc(e.source)}">${esc(source?.label ?? e.source)}</td><td>${esc(e.label)}${conf}${stale}</td></tr>`
        }).join('')}
      </tbody></table>
    </div>`
  }

  if (!outgoing.length && !incoming.length) {
    html = '<div id="kg-empty">no relationships for this entity</div>'
  }

  const body = document.getElementById('kg-rel-body')
  body.innerHTML = html
  body.querySelectorAll('.kg-target').forEach(el => {
    el.addEventListener('click', () => {
      const targetId = el.dataset.id
      const targetNode = kgNodes.find(n => n.id === targetId)
      if (!targetNode) return
      // scroll entity into view and select
      const q = document.getElementById('kg-entity-search').value.toLowerCase()
      const filtered = q ? kgNodes.filter(n => n.label.toLowerCase().includes(q) || n.id.toLowerCase().includes(q)) : kgNodes
      if (!filtered.find(n => n.id === targetId)) {
        document.getElementById('kg-entity-search').value = ''
        renderEntityList(kgNodes)
      }
      selectEntity(targetId)
      setTimeout(() => {
        document.querySelector(`.kg-entity-row[data-id="${CSS.escape(targetId)}"]`)?.scrollIntoView({ block: 'nearest' })
      }, 0)
    })
  })
}

// ── timeline ───────────────────────────────────────────────────────────────
async function loadTimeline() {
  timelineLoaded = true

  const el = document.getElementById('timeline-content')
  let url = '/api/drawers/recent?limit=200&sort=' + sortOrder
  if (activeWing) url += '&wing=' + encodeURIComponent(activeWing)
  const data = await api(url)
  const drawers = data.drawers ?? []
  if (!drawers.length) { el.innerHTML = '<div class="search-empty">no drawers</div>'; return }

  // Group by date
  const groups = new Map()
  for (const d of drawers) {
    const date = formatDate(d.filed_at) || 'unknown'
    if (!groups.has(date)) groups.set(date, [])
    groups.get(date).push(d)
  }

  el.innerHTML = [...groups.entries()].map(([date, items]) => `
    <div class="timeline-group">
      <div class="timeline-date">${esc(date)}</div>
      <div class="timeline-items">
        ${items.map(d => drawerCard(d)).join('')}
      </div>
    </div>
  `).join('')
}

// ── tabs ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'))
    tab.classList.add('active')
    const name = tab.dataset.tab
    document.getElementById('tab-' + name).classList.add('active')
    if (name === 'graph') loadGraph()
    if (name === 'timeline') loadTimeline()
    if (name === 'search') loadRoomsForSearch()
  })
})

// ── init ───────────────────────────────────────────────────────────────────
// Sort toggle handler
function initSortToggles(containerId, reloadFn) {
  const container = document.getElementById(containerId)
  if (!container) return
  container.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      sortOrder = btn.dataset.sort
      document.querySelectorAll('.sort-toggle .sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === sortOrder))
      reloadFn()
    })
  })
}

loadStats()
loadWings()
loadRecentDrawers()
initSortToggles('overview-sort', loadRecentDrawers)
initSortToggles('timeline-sort', loadTimeline)
</script>
</body>
